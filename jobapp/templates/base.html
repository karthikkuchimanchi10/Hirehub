{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>HireHub</title>

    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>

        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form {
            width: 400px;
            padding: 30px;
            background: #1e293b;
            border-radius: 8px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.3);
        }

        .heading {
            text-align: center;
            background: linear-gradient(to right, #3b82f6, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(to right, #3b82f6, #a855f7);
            border: none;
            width: 100%;
            margin-top: 20px;
            color: white;
            border-radius: 4px;
            padding: 10px;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: white;
            color: black;
            border: none;
            width: 100%;
            margin-top: 15px;
            border-radius: 4px;
            padding: 10px;
            text-decoration: none;
            font-weight: 500;
        }

        .google-btn img {
            width: 20px;
            height: 20px;
        }

        a {
            color: #3b82f6;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

    </style>

</head>

<body>

{% block content %}
{% endblock %}

</body>
</html>
