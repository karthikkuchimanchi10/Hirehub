{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f6fa; padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: auto; background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { color: #1f2d3d; margin-bottom: 20px; font-weight: 600; }
    p { color: #333333; line-height: 1.6; margin-bottom: 15px; font-size: 14px; }
    .button { display: inline-block; padding: 12px 25px; margin: 20px 0; background-color: #0056b3; color: #ffffff; text-decoration: none; border-radius: 5px; font-weight: 600; }
    .footer { margin-top: 25px; font-size: 12px; color: #888888; line-height: 1.4; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Forget Password OTP</h1>
    <p>Dear {{ username }},</p>
    <p>Your OTP for password reset is <strong>{{ otp }}</strong>.</p>
    <p>Do not share it with anyone.</p>
    <p>If it is not you, please contact support.</p>
  </div>
  <div class="footer">
    <p>Best regards,<br>HireHub Team</p>
  </div>
</body>
</html>
