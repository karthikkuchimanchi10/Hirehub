<html>
    <head>
        <title>Job Posts</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background-color: #0b0c1a;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
        }

        .container {
            max-width: 1100px;
        }

        .page-title {
            color: #a970ff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filter-icon {
            font-size: 0.9rem;
            cursor: pointer;
            color: #c4b5fd;
        }

        .filter-icon:hover {
            color: #ffffff;
        }

        .dropdown-menu {
            background-color: #141526;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .dropdown-item {
            color: #e5e7eb;
        }

        .dropdown-item:hover,
        .dropdown-item.active {
            background-color: #7c3aed;
            color: #fff;
        }
        </style>
        <body>
            <div class="container mt-5">
                <h2 class="page-title mb-4">
                    Available Job Posts
                    <i class="fas fa-filter filter-icon" data-bs-toggle="dropdown"></i>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" href="#">All Jobs</a></li>
                        <li><a class="dropdown-item" href="#">Active Jobs</a></li>
                        <li><a class="dropdown-item" href="#">Expired Jobs</a></li>
                    </ul>
                </h2>
                {% for job in job_posts %}
                <div class="job-card">
                    <h4>{{ job.title }}</h4>
                    <p><strong>Company:</strong> {{ job.company_name }}</p>
                    <p><strong>Location:</strong> {{ job.location }}</p>
                    <p><strong>Posted On:</strong> {{ job.posted_on }}</p>
                    <p><strong>Last Date to Apply:</strong> {{ job.last_date_to_apply }}</p>
                    <a href="{% url 'job_detail' job.id %}" class="btn btn-primary">View Details</a>
        </body>
    </head>
</html>
