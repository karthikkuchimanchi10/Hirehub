{% load static %}
<html>
<head>
    <title>HR Signin Page</title>

    <!-- ✅ Bootstrap CSS -->
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="UTF-8">

    <style>
body {
    background-color: #0f172a;
      color: white;
      width:auto;
  }

.login-form {
  width: 600px;                
  margin: auto;                 
  padding: 30px;                
  background: #1e293b;
  border-radius: 8px;           
  box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.3);
}


  .heading  {
    text-align: center;
    background: linear-gradient(to right, #3b82f6, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 20px;
  }
  button{
    background: linear-gradient(to right, #3b82f6, #a855f7);
      border: 5px solid transparent;
      width: 100%;
      margin-top: 20px;
      color: white;
      border-radius: 0.2px;
  }
    </style>
</head>
<body>

    <form method="post" action="" class="login-form">
        {% csrf_token %}
        <h2 class="heading"> HR Registration Form</h2>

        {% for field in form %}
            <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                    <div class="text-danger">{{ field.errors }}</div>
                {% endif %}
            </div>
        {% endfor %}

        <button type="submit" name="submit" class="button"> Register</button>
        <h4 class="mt-3 text-center">(OR)</h4>
        <h6 class="mt-3 text-center">Already have an account? Click Here To <a href="{% url 'login' 'hr' %}" style="color: #a855f7;"> Login</a></h6>
        
        {% if error_message %}
            <div class="alert alert-danger text-center">
                 {{ error_message }}
            </div>
        {% endif %}

    </form>

</body>
</html>
